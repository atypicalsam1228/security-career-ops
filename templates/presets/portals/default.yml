# Portal Scanner Configuration — TS/SCI Cybersecurity Professional
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# Focus: GRC, ISSM, Cloud Security, AI Security, DevSecOps
# Clearance: TS/SCI

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- GRC / Compliance / RMF --
    - "GRC"
    - "Compliance"
    - "RMF"
    - "FedRAMP"
    - "NIST"
    - "FISMA"
    - "CMMC"
    - "STIG"
    - "ATO"
    - "Zero Trust"
    # -- Security Engineering & Architecture --
    - "Security Engineer"
    - "Security Architect"
    - "Cloud Security"
    - "Cybersecurity"
    - "Information Security"
    - "InfoSec"
    # -- ISSO / ISSM --
    - "ISSO"
    - "ISSM"
    # -- DevSecOps & SecOps --
    - "DevSecOps"
    - "Security Operations"
    - "SOC"
    # -- AI Security & Governance --
    - "AI Security"
    - "AI Governance"
    # -- Risk & Vulnerability --
    - "Risk Management"
    - "Vulnerability Management"
    # -- Clearance keywords --
    - "Cleared"
    - "TS/SCI"
    - "Secret"
    - "Top Secret"
  negative:
    # -- Seniority mismatch --
    - "Junior"
    - "Intern"
    - "Entry Level"
    # -- Wrong tech stacks --
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    # -- Irrelevant domains --
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP"
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    # -- Non-security business roles --
    - "Marketing"
    - "Sales"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:

  # -- ClearanceJobs --
  - name: ClearanceJobs — GRC & RMF
    query: 'site:clearancejobs.com "GRC" OR "RMF" OR "FedRAMP" OR "NIST" "TS/SCI" remote'
    enabled: true

  - name: ClearanceJobs — ISSM & ISSO
    query: 'site:clearancejobs.com "ISSM" OR "ISSO" OR "Information System Security" "TS/SCI"'
    enabled: true

  - name: ClearanceJobs — Cloud Security
    query: 'site:clearancejobs.com "Cloud Security" OR "AWS Security" OR "Azure Security" "TS/SCI"'
    enabled: true

  - name: ClearanceJobs — DevSecOps
    query: 'site:clearancejobs.com "DevSecOps" OR "Security Engineer" "TS/SCI" remote'
    enabled: true

  - name: ClearanceJobs — Zero Trust & STIG
    query: 'site:clearancejobs.com "Zero Trust" OR "STIG" OR "ATO" "TS/SCI"'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Security Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Security Engineer" OR "Cloud Security" OR "Cybersecurity" remote'
    enabled: true

  - name: Greenhouse — DevSecOps
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "DevSecOps" OR "Security Operations" remote'
    enabled: true

  - name: Greenhouse — Compliance & ISSO
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Compliance" OR "ISSO" OR "GRC" OR "FedRAMP" remote'
    enabled: true

  - name: Greenhouse — AI Security
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Security" OR "AI Governance" OR "AI Safety" remote'
    enabled: true

  # -- Ashby --
  - name: Ashby — Security Engineer
    query: 'site:jobs.ashbyhq.com "Security Engineer" OR "Cloud Security" OR "Cybersecurity" remote'
    enabled: true

  - name: Ashby — GRC & Compliance
    query: 'site:jobs.ashbyhq.com "GRC" OR "Compliance" OR "FedRAMP" OR "Risk" remote'
    enabled: true

  - name: Ashby — DevSecOps
    query: 'site:jobs.ashbyhq.com "DevSecOps" OR "Security Operations" remote'
    enabled: true

  # -- Lever --
  - name: Lever — Security Architect
    query: 'site:jobs.lever.co "Security Architect" OR "Security Engineer" OR "Cloud Security" remote'
    enabled: true

  - name: Lever — DevSecOps
    query: 'site:jobs.lever.co "DevSecOps" OR "Security Operations" OR "ISSO" remote'
    enabled: true

  # -- General / Cross-portal --
  - name: General — TS/SCI Cybersecurity
    query: '"TS/SCI" "cybersecurity" OR "information security" OR "ISSM" remote'
    enabled: true

  - name: General — FedRAMP Engineer
    query: '"FedRAMP" "engineer" OR "architect" OR "assessor" remote'
    enabled: true

  - name: General — CMMC & DFARS
    query: '"CMMC" OR "DFARS" "security" OR "compliance" OR "assessor" remote'
    enabled: true

  - name: General — AI Security Roles
    query: '"AI Security" OR "AI Governance" OR "AI Safety" "engineer" OR "architect" OR "manager" remote'
    enabled: true

