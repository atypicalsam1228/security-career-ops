# Portal Scanner Configuration — Cloud-Native Security
# Preset: cloud
# Focus: Cloud security, DevSecOps, CNAPP, IAM, Zero Trust, container security
# Clearance: Optional

title_filter:
  positive:
    # -- Cloud Security --
    - "Cloud Security"
    - "AWS Security"
    - "Azure Security"
    - "GCP Security"
    - "DevSecOps"
    - "Container Security"
    - "Kubernetes Security"
    - "CSPM"
    - "CWPP"
    - "CNAPP"
    - "IAM"
    - "Identity"
    - "Zero Trust"
    - "Infrastructure Security"
    - "Platform Security"
    - "SRE Security"
  negative:
    - "Junior"
    - "Intern"
    - "Entry Level"
    - "PHP"
    - "Ruby"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Marketing"
    - "Sales"
    - "SAP"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

search_queries:

  # -- Greenhouse --
  - name: Greenhouse — Cloud Security Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Cloud Security" OR "AWS Security" OR "Azure Security" OR "GCP Security"'
    enabled: true

  - name: Greenhouse — DevSecOps & Platform Security
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "DevSecOps" OR "Platform Security" OR "Infrastructure Security" OR "Container Security"'
    enabled: true

  # -- Ashby --
  - name: Ashby — Cloud & Container Security
    query: 'site:jobs.ashbyhq.com "Cloud Security" OR "Container Security" OR "Kubernetes" OR "DevSecOps" OR "CNAPP"'
    enabled: true

  - name: Ashby — IAM & Zero Trust
    query: 'site:jobs.ashbyhq.com "IAM" OR "Identity" OR "Zero Trust" OR "Platform Security"'
    enabled: true

  # -- Lever --
  - name: Lever — DevSecOps & Cloud
    query: 'site:jobs.lever.co "DevSecOps" OR "Cloud Security" OR "Infrastructure Security" OR "Platform Security"'
    enabled: true

  # -- General --
  - name: General — CNAPP & CSPM
    query: '"CNAPP" OR "CSPM" OR "CWPP" "engineer" OR "architect" OR "lead" remote'
    enabled: true

  - name: General — Kubernetes Security
    query: '"Kubernetes Security" OR "Container Security" OR "K8s Security" "engineer" OR "architect" remote'
    enabled: true

  - name: General — Cloud Security Architect
    query: '"Cloud Security Architect" OR "Cloud Security Engineer" remote'
    enabled: true

  - name: General — Zero Trust Engineer
    query: '"Zero Trust" "engineer" OR "architect" OR "security" remote'
    enabled: true

  - name: General — IAM & Identity Security
    query: '"IAM" OR "Identity Security" OR "Identity Engineer" "cloud" OR "security" remote'
    enabled: true

  - name: General — DevSecOps Engineer
    query: '"DevSecOps" "engineer" OR "lead" OR "architect" OR "senior" remote'
    enabled: true

tracked_companies:

  # ============================================================
  # Cloud Providers
  # ============================================================

  - name: Amazon Web Services (AWS)
    careers_url: https://www.amazon.jobs
    scan_method: websearch
    scan_query: 'site:amazon.jobs "AWS" "Cloud Security" OR "Security Engineer" OR "DevSecOps" OR "IAM"'
    notes: "AWS security team. IAM, GuardDuty, Security Hub, GovCloud."
    enabled: true

  - name: Microsoft Azure
    careers_url: https://careers.microsoft.com
    scan_method: websearch
    scan_query: 'site:careers.microsoft.com "Azure" "Security" OR "Cloud Security" OR "Identity" OR "Zero Trust"'
    notes: "Azure security team. Sentinel, Defender, Entra ID."
    enabled: true

  - name: Google Cloud
    careers_url: https://www.google.com/about/careers
    scan_method: websearch
    scan_query: 'site:google.com/about/careers "Cloud Security" OR "GCP Security" OR "Infrastructure Security" OR "Platform Security"'
    notes: "Google Cloud security team. Chronicle, BeyondCorp, Mandiant."
    enabled: true

  # ============================================================
  # CNAPP / CSPM Vendors
