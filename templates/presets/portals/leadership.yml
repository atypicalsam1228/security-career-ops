# Portal Scanner Configuration — Security Leadership
# Preset: leadership
# Focus: CISO, VP/Director security, security program management
# Clearance: Optional

title_filter:
  positive:
    # -- Leadership Titles --
    - "CISO"
    - "Chief Information Security"
    - "VP Security"
    - "Director Security"
    - "Head of Security"
    - "Security Director"
    - "GRC Director"
    - "Security Program Manager"
    - "Security Operations Manager"
    - "Engineering Manager Security"
    - "Chief Security"
    - "Information Security Officer"
  negative:
    - "Junior"
    - "Intern"
    - "Entry Level"
    - "Associate"
    - ".NET"
    - "PHP"
    - "Ruby"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Marketing"
    - "Sales"
    - "SAP"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "VP"
    - "C-Suite"
    - "Executive"

search_queries:

  # -- Greenhouse --
  - name: Greenhouse — CISO & VP Security
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "CISO" OR "VP Security" OR "Vice President Security" OR "Head of Security"'
    enabled: true

  - name: Greenhouse — Director Security
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Director" "Security" OR "Information Security" OR "Cybersecurity"'
    enabled: true

  # -- Lever --
  - name: Lever — CISO & VP Security
    query: 'site:jobs.lever.co "CISO" OR "VP Security" OR "Head of Security" OR "Director Security"'
    enabled: true

  - name: Lever — Security Program Manager
    query: 'site:jobs.lever.co "Security Program Manager" OR "Security Operations Manager" OR "Engineering Manager Security"'
    enabled: true

  # -- Ashby --
  - name: Ashby — Security Leadership
    query: 'site:jobs.ashbyhq.com "CISO" OR "Head of Security" OR "Director Security" OR "VP Security"'
    enabled: true

  # -- ClearanceJobs --
  - name: ClearanceJobs — Security Director
    query: 'site:clearancejobs.com "Security Director" OR "CISO" OR "ISSM" "director" OR "VP" "TS/SCI"'
    enabled: true

  # -- General --
  - name: General — CISO
    query: '"CISO" OR "Chief Information Security Officer" remote OR hybrid'
    enabled: true

  - name: General — Head of Security
    query: '"Head of Security" OR "VP of Security" OR "Vice President" "security" remote OR hybrid'
    enabled: true

  - name: General — Security Director
    query: '"Director" "Information Security" OR "Cybersecurity" OR "Security Operations" OR "GRC" remote OR hybrid'
    enabled: true

  - name: General — Security Program Manager
    query: '"Security Program Manager" OR "Security Operations Manager" "senior" OR "director" remote OR hybrid'
    enabled: true

  - name: General — Engineering Manager Security
    query: '"Engineering Manager" "Security" OR "InfoSec" OR "AppSec" remote OR hybrid'
    enabled: true

