# Portal Scanner Configuration — Offensive Security / Red Team
# Preset: offensive
# Focus: Penetration testing, red teaming, AppSec, vulnerability research
# Clearance: Optional TS/SCI for government offensive roles

title_filter:
  positive:
    # -- Offensive Security --
    - "Penetration"
    - "Pentest"
    - "Red Team"
    - "Offensive"
    - "AppSec"
    - "Application Security"
    - "Bug Bounty"
    - "Vulnerability Research"
    - "Exploit"
    - "Threat Intelligence"
    - "Malware"
    - "Reverse Engineer"
    - "Security Research"
    - "CTF"
    - "Ethical Hacker"
  negative:
    - "Junior"
    - "Intern"
    - "Entry Level"
    - ".NET"
    - "PHP"
    - "Ruby"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Marketing"
    - "Sales"
    - "SAP"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

search_queries:

  # -- Greenhouse --
  - name: Greenhouse — Pentest & Red Team
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Penetration" OR "Pentest" OR "Red Team" OR "Offensive Security"'
    enabled: true

  - name: Greenhouse — AppSec & Security Research
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Application Security" OR "AppSec" OR "Security Research" OR "Vulnerability"'
    enabled: true

  # -- Ashby --
  - name: Ashby — Offensive Security
    query: 'site:jobs.ashbyhq.com "Penetration" OR "Red Team" OR "Offensive" OR "AppSec" OR "Security Research"'
    enabled: true

  # -- Lever --
  - name: Lever — Pentest & Red Team
    query: 'site:jobs.lever.co "Penetration" OR "Pentest" OR "Red Team" OR "Offensive" OR "AppSec"'
    enabled: true

  # -- ClearanceJobs --
  - name: ClearanceJobs — Offensive Cyber
    query: 'site:clearancejobs.com "Offensive Cyber" OR "Red Team" OR "Penetration" OR "Exploit" "TS/SCI"'
    enabled: true

  - name: ClearanceJobs — Vulnerability Research
    query: 'site:clearancejobs.com "Vulnerability Research" OR "Reverse Engineer" OR "Malware Analyst" "TS/SCI"'
    enabled: true

  # -- General --
  - name: General — Bug Bounty Roles
    query: '"Bug Bounty" "engineer" OR "manager" OR "triage" OR "program" remote'
    enabled: true

  - name: General — Pentest Engineer
    query: '"Penetration Tester" OR "Pentest Engineer" OR "Offensive Security Engineer" remote'
    enabled: true

  - name: General — Red Team Lead
    query: '"Red Team" "lead" OR "manager" OR "senior" OR "principal" remote'
    enabled: true

  - name: General — Reverse Engineering
    query: '"Reverse Engineer" OR "Malware Analyst" OR "Exploit Developer" remote'
    enabled: true

  - name: General — Application Security
    query: '"Application Security" OR "AppSec" "engineer" OR "architect" OR "lead" remote'
    enabled: true

  - name: General — Threat Intelligence
    query: '"Threat Intelligence" "analyst" OR "engineer" OR "lead" remote'
    enabled: true

