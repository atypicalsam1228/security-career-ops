# Portal Scanner Configuration — Federal Compliance / GRC
# Preset: grc
# Focus: RMF, FedRAMP, FISMA, CMMC, ISSO/ISSM, 3PAO, ATO
# Clearance: TS/SCI preferred

title_filter:
  positive:
    # -- Core GRC --
    - "RMF"
    - "NIST"
    - "FedRAMP"
    - "FISMA"
    - "CMMC"
    - "DFARS"
    - "ISSO"
    - "ISSM"
    - "Compliance"
    - "GRC"
    - "ATO"
    - "Authorization"
    - "eMASS"
    - "OSCAL"
    - "POA&M"
    - "Security Control"
    - "Assessor"
    - "3PAO"
    - "Auditor"
  negative:
    - "Junior"
    - "Intern"
    - "Entry Level"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Marketing"
    - "Sales"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

search_queries:

  # -- ClearanceJobs --
  - name: ClearanceJobs — ISSO & ISSM
    query: 'site:clearancejobs.com "ISSO" OR "ISSM" OR "Information System Security" "TS/SCI"'
    enabled: true

  - name: ClearanceJobs — RMF & ATO
    query: 'site:clearancejobs.com "RMF" OR "ATO" OR "Risk Management Framework" "TS/SCI"'
    enabled: true

  - name: ClearanceJobs — FedRAMP & CMMC
    query: 'site:clearancejobs.com "FedRAMP" OR "CMMC" OR "DFARS" OR "FISMA"'
    enabled: true

  # -- USAJobs --
  - name: USAJobs — Cybersecurity GRC
    query: 'site:usajobs.gov "cybersecurity" OR "information security" OR "ISSM" OR "ISSO" OR "GRC"'
    enabled: true

  - name: USAJobs — FedRAMP & Compliance
    query: 'site:usajobs.gov "FedRAMP" OR "compliance" OR "RMF" OR "ATO" OR "security control assessor"'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Compliance Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Compliance" OR "GRC" OR "FedRAMP" OR "NIST" OR "Assessor"'
    enabled: true

  - name: Greenhouse — ISSO & ISSM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "ISSO" OR "ISSM" OR "Security Control" OR "Authorization"'
    enabled: true

  # -- Ashby --
  - name: Ashby — GRC & Compliance
    query: 'site:jobs.ashbyhq.com "GRC" OR "Compliance" OR "FedRAMP" OR "RMF" OR "ATO"'
    enabled: true

  # -- Lever --
  - name: Lever — Compliance & GRC
    query: 'site:jobs.lever.co "Compliance" OR "GRC" OR "FedRAMP" OR "Security Control"'
    enabled: true

  # -- General --
  - name: General — eMASS & OSCAL
    query: '"eMASS" OR "OSCAL" "engineer" OR "analyst" OR "specialist" remote'
    enabled: true

  - name: General — 3PAO Assessor
    query: '"3PAO" OR "FedRAMP assessor" OR "security control assessor" remote'
    enabled: true

  - name: General — CMMC & DFARS
    query: '"CMMC" OR "DFARS" "assessor" OR "compliance" OR "analyst" remote'
    enabled: true

