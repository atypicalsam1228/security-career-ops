    scan_method: websearch
    scan_query: 'site:jobs.cisco.com "Splunk" OR "SIEM" OR "Detection" OR "SOC" OR "Security Operations"'
    notes: "SIEM leader (acquired by Cisco). Splunk Enterprise Security, SOAR."
    enabled: true

  - name: Elastic
    careers_url: https://www.elastic.co/careers
