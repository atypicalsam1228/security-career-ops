# Portal Scanner Configuration — Security Operations
# Preset: soc
# Focus: SOC, detection engineering, incident response, threat hunting, SIEM/SOAR
# Clearance: Optional for government SOC roles

title_filter:
  positive:
    # -- Security Operations --
    - "SOC"
    - "Security Operations"
    - "Detection Engineer"
    - "Incident Response"
    - "Threat Hunter"
    - "SIEM"
    - "SOAR"
    - "Security Analyst"
    - "Forensics"
    - "Digital Forensics"
    - "Malware Analyst"
    - "Threat Detection"
    - "Security Monitoring"
    - "EDR"
    - "XDR"
    - "MDR"
  negative:
    - "Junior"
    - "Intern"
    - "Entry Level"
    - ".NET"
    - "PHP"
    - "Ruby"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Marketing"
    - "Sales"
    - "SAP"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

search_queries:

  # -- Greenhouse --
  - name: Greenhouse — SOC & Detection
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "SOC" OR "Detection Engineer" OR "Security Operations" OR "Threat Detection"'
    enabled: true

  - name: Greenhouse — Incident Response & Forensics
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Incident Response" OR "Forensics" OR "Malware Analyst" OR "Threat Hunter"'
    enabled: true

  # -- Ashby --
  - name: Ashby — SOC & Detection
    query: 'site:jobs.ashbyhq.com "SOC" OR "Detection Engineer" OR "Security Analyst" OR "Threat Hunter" OR "Security Operations"'
    enabled: true

  # -- Lever --
  - name: Lever — Incident Response & SOC
    query: 'site:jobs.lever.co "Incident Response" OR "SOC" OR "Security Operations" OR "Detection" OR "Threat Hunter"'
    enabled: true

  # -- ClearanceJobs --
  - name: ClearanceJobs — SOC Analyst
    query: 'site:clearancejobs.com "SOC" OR "Security Operations" OR "Security Analyst" "TS/SCI"'
    enabled: true

  - name: ClearanceJobs — Incident Response
    query: 'site:clearancejobs.com "Incident Response" OR "Digital Forensics" OR "Threat Hunter" "TS/SCI"'
    enabled: true

  # -- General --
  - name: General — Threat Hunting
    query: '"Threat Hunter" OR "Threat Hunting" "engineer" OR "analyst" OR "lead" OR "senior" remote'
    enabled: true

  - name: General — Detection Engineering
    query: '"Detection Engineer" OR "Detection Engineering" remote'
    enabled: true

  - name: General — SIEM Engineer
    query: '"SIEM" OR "Splunk" OR "Sentinel" OR "Chronicle" "engineer" OR "analyst" OR "architect" remote'
    enabled: true

  - name: General — SOAR & Automation
    query: '"SOAR" OR "Security Automation" OR "Security Orchestration" "engineer" OR "analyst" remote'
    enabled: true

  - name: General — Digital Forensics
    query: '"Digital Forensics" OR "DFIR" OR "Forensic Analyst" OR "Forensic Engineer" remote'
    enabled: true

  - name: General — EDR/XDR/MDR
    query: '"EDR" OR "XDR" OR "MDR" "engineer" OR "analyst" OR "architect" "security" remote'
    enabled: true

tracked_companies:

  # ============================================================
  # SIEM / SOAR Vendors
