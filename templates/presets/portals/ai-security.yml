# Portal Scanner Configuration — AI/ML Security
# Preset: ai-security
# Focus: AI safety, AI governance, LLM security, AI red teaming, responsible AI
# Clearance: Optional for defense AI roles

title_filter:
  positive:
    # -- AI Security & Safety --
    - "AI Security"
    - "AI Safety"
    - "AI Governance"
    - "AI Risk"
    - "AI Red Team"
    - "LLM Security"
    - "ML Security"
    - "Responsible AI"
    - "AI Ethics"
    - "Prompt Injection"
    - "AI Assurance"
    - "Trustworthy AI"
    - "AI Compliance"
    - "NIST AI RMF"
    - "Machine Learning Security"
  negative:
    - "Junior"
    - "Intern"
    - "Entry Level"
    - "PHP"
    - "Ruby"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Marketing"
    - "Sales"
    - "SAP"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

search_queries:

  # -- Greenhouse --
  - name: Greenhouse — AI Security & Safety
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Security" OR "AI Safety" OR "AI Red Team" OR "LLM Security"'
    enabled: true

  - name: Greenhouse — AI Governance & Responsible AI
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Governance" OR "Responsible AI" OR "AI Ethics" OR "AI Risk" OR "AI Compliance"'
    enabled: true

  # -- Ashby --
  - name: Ashby — AI Security & Safety
    query: 'site:jobs.ashbyhq.com "AI Security" OR "AI Safety" OR "AI Red Team" OR "ML Security" OR "Trustworthy AI"'
    enabled: true

  # -- Lever --
  - name: Lever — AI Governance & Risk
    query: 'site:jobs.lever.co "AI Governance" OR "AI Risk" OR "Responsible AI" OR "AI Safety" OR "AI Security"'
    enabled: true

  # -- ClearanceJobs --
  - name: ClearanceJobs — AI/ML Security
    query: 'site:clearancejobs.com "AI Security" OR "Machine Learning" OR "AI Safety" OR "AI Governance" "TS/SCI"'
    enabled: true

  - name: ClearanceJobs — AI Red Team
    query: 'site:clearancejobs.com "AI Red Team" OR "AI Assurance" OR "AI Risk" OR "AI Testing" "TS/SCI"'
    enabled: true

  # -- General --
  - name: General — Responsible AI
    query: '"Responsible AI" OR "AI Ethics" "engineer" OR "manager" OR "lead" OR "program" remote'
    enabled: true

  - name: General — AI Safety Researcher
    query: '"AI Safety" "researcher" OR "engineer" OR "scientist" OR "lead" remote'
    enabled: true

  - name: General — AI Red Team
    query: '"AI Red Team" OR "LLM Red Team" OR "AI Adversarial" "engineer" OR "researcher" OR "lead" remote'
    enabled: true

  - name: General — AI Governance
    query: '"AI Governance" OR "AI Compliance" OR "NIST AI RMF" "engineer" OR "manager" OR "analyst" remote'
    enabled: true

  - name: General — ML Security Engineer
    query: '"ML Security" OR "Machine Learning Security" OR "AI Security Engineer" remote'
    enabled: true

  - name: General — Trustworthy AI
    query: '"Trustworthy AI" OR "AI Assurance" OR "AI Risk Management" remote'
    enabled: true

